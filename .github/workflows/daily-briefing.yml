name: Daily Job Briefing

on:
  # 매일 12:00 KST: cron-job.org가 workflow_dispatch 호출 (CLOUD_SETUP.md §8)
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check GitHub Secrets
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          missing=""
          for name in NAVER_CLIENT_ID NAVER_CLIENT_SECRET EMAIL_FROM EMAIL_PASSWORD EMAIL_TO; do
            eval "val=\$$name"
            if [ -z "$val" ]; then
              missing="$missing $name"
            fi
          done
          channel=$(python3 -c "import yaml; print((yaml.safe_load(open('config.yaml')) or {}).get('job_briefing', {}).get('channel', 'telegram'))")
          if [ "$channel" = "telegram" ]; then
            for name in TELEGRAM_BOT_TOKEN TELEGRAM_CHAT_ID; do
              eval "val=\$$name"
              if [ -z "$val" ]; then
                missing="$missing $name"
              fi
            done
          fi
          if [ -n "$missing" ]; then
            echo "GitHub → Settings → Secrets and variables → Actions 에서 등록해 주세요:"
            echo "$missing"
            echo "자세한 목록: CLOUD_SETUP.md"
            exit 1
          fi

      - name: Run job-alert
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_REDIRECT_URI: http://localhost:8080
        run: python main.py
