name: Realtime Job Alerts

on:
  # 10분 주기: cron-job.org 등 외부 스케줄러가 workflow_dispatch 호출 (CLOUD_SETUP.md §6)
  # GitHub 내장 */10 cron은 실행이 자주 스킵되어 제거함
  workflow_dispatch:
  schedule:
    # 외부 스케줄러 장애 시 백업 (매시 7분 UTC ≈ 한국 매시 16분)
    - cron: "7 * * * *"

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare data directory
        run: mkdir -p data

      - name: Restore watch state
        uses: actions/cache/restore@v4
        with:
          path: |
            data/kicpa_notified.json
            data/pwc_graduate_state.json
            data/saramin_notified.json
            data/kpmg_notified.json
            data/ey_notified.json
            data/stock_daily_sent.json
          key: job-alert-watch-state-v2
          restore-keys: |
            job-alert-watch-state-v2
            job-alert-watch-state-v1
            job-alert-stock-daily-v1

      - name: Check Kakao Secrets
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
        run: |
          missing=""
          for name in KAKAO_REST_API_KEY KAKAO_REFRESH_TOKEN; do
            eval "val=\$$name"
            if [ -z "$val" ]; then
              missing="$missing $name"
            fi
          done
          if [ -n "$missing" ]; then
            echo "GitHub Secrets에 카카오 키를 등록해 주세요:$missing"
            exit 1
          fi

      - name: Watch KICPA trainee CPA jobs
        env:
          STOCK_DAILY_STATE_FILE: data/stock_daily_sent.json
          KICPA_STATE_FILE: data/kicpa_notified.json
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_REDIRECT_URI: http://localhost:8080
        run: python kicpa_watch.py

      - name: Watch Samil PwC graduate recruitment
        env:
          PWC_STATE_FILE: data/pwc_graduate_state.json
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_REDIRECT_URI: http://localhost:8080
        run: python pwc_watch.py

      - name: Watch Saramin Big4 jobs
        env:
          SARAMIN_STATE_FILE: data/saramin_notified.json
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_REDIRECT_URI: http://localhost:8080
        run: python saramin_watch.py

      - name: Watch Samjong KPMG career site
        env:
          KPMG_STATE_FILE: data/kpmg_notified.json
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_REDIRECT_URI: http://localhost:8080
        run: python kpmg_watch.py

      - name: Watch EY Han Young career site
        env:
          EY_STATE_FILE: data/ey_notified.json
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_REDIRECT_URI: http://localhost:8080
        run: python ey_watch.py

      - name: Save watch state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            data/kicpa_notified.json
            data/pwc_graduate_state.json
            data/saramin_notified.json
            data/kpmg_notified.json
            data/ey_notified.json
            data/stock_daily_sent.json
          key: job-alert-watch-state-v2
