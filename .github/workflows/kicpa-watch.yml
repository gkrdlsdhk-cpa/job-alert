name: Realtime Job Alerts

on:
  # 10분 주기: cron-job.org 등 외부 스케줄러가 workflow_dispatch 호출 (CLOUD_SETUP.md §6)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: realtime-job-alerts
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout watch state
        uses: actions/checkout@v4
        with:
          ref: job-alert-state
          path: state

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore watch state
        run: |
          mkdir -p data
          if [ -d state/data ]; then
            cp -R state/data/. data/
            echo "Restored watch state from job-alert-state branch."
          else
            echo "No saved watch state found; current run will create a baseline."
          fi

      - name: Check Kakao Secrets
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
        run: |
          missing=""
          for name in KAKAO_REST_API_KEY KAKAO_REFRESH_TOKEN; do
            eval "val=\$$name"
            if [ -z "$val" ]; then
              missing="$missing $name"
            fi
          done
          if [ -n "$missing" ]; then
            echo "GitHub Secrets에 카카오 키를 등록해 주세요:$missing"
            exit 1
          fi

      - name: Run Realtime Job Alerts
        env:
          KICPA_STATE_FILE: data/kicpa_notified.json
          PWC_STATE_FILE: data/pwc_graduate_state.json
          SARAMIN_STATE_FILE: data/saramin_notified.json
          KPMG_STATE_FILE: data/kpmg_notified.json
          EY_STATE_FILE: data/ey_notified.json
          DELOITTE_STATE_FILE: data/deloitte_notified.json
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_REDIRECT_URI: http://localhost:8080
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: python realtime_watch.py

      - name: Save watch state
        if: always()
        run: |
          cd state
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin job-alert-state
          git rebase origin/job-alert-state
          cd ..

          mkdir -p state/data
          for file in \
            data/kicpa_notified.json \
            data/pwc_graduate_state.json \
            data/saramin_notified.json \
            data/kpmg_notified.json \
            data/ey_notified.json \
            data/deloitte_notified.json
          do
            if [ -f "$file" ]; then
              cp "$file" state/data/
            fi
          done

          cd state

          if ls data/*.json >/dev/null 2>&1; then
            git add -f data/*.json
          else
            echo "No watch state files to save."
            exit 0
          fi

          if git diff --cached --quiet; then
            echo "Watch state unchanged."
          else
            git commit -m "Update realtime watch state"
            for attempt in 1 2 3 4 5; do
              if git push origin HEAD:job-alert-state; then
                echo "Watch state pushed on attempt ${attempt}."
                exit 0
              fi
              echo "Watch state push failed on attempt ${attempt}; syncing and retrying."
              git fetch origin job-alert-state
              git rebase origin/job-alert-state
              sleep $((attempt * 3))
            done
            echo "Watch state push failed after retries."
            exit 1
          fi
