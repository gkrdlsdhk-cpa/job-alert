name: Medication Mark Taken

on:
  workflow_dispatch:
    inputs:
      mark_secret:
        description: "복용 체크 인증 키 (GAS → GitHub)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  mark-taken:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Verify mark secret
        env:
          MARK_SECRET: ${{ secrets.MEDICATION_MARK_SECRET }}
          INPUT_SECRET: ${{ github.event.inputs.mark_secret }}
        run: |
          if [ -z "$MARK_SECRET" ]; then
            echo "GitHub Secret MEDICATION_MARK_SECRET 을 등록해 주세요."
            exit 1
          fi
          if [ "$INPUT_SECRET" != "$MARK_SECRET" ]; then
            echo "인증 키가 일치하지 않습니다."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare data directory
        run: mkdir -p data

      - name: Restore medication state
        uses: actions/cache/restore@v4
        with:
          path: data/medication_daily_state.json
          key: job-alert-medication-state-v2

      - name: Mark medication taken
        env:
          MEDICATION_DAILY_STATE_FILE: data/medication_daily_state.json
        run: python medication_mark_taken.py

      - name: Save medication state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/medication_daily_state.json
          key: job-alert-medication-state-v2
