name: Morning Stock Alert

on:
  # 매일 09:00 KST: cron-job.org가 workflow_dispatch 호출 (CLOUD_SETUP.md §7)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stock-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare data directory
        run: mkdir -p data

      - name: Restore stock daily state
        uses: actions/cache/restore@v4
        with:
          path: data/stock_daily_sent.json
          key: job-alert-stock-daily-v1

      - name: Check Telegram Secrets
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          for name in TELEGRAM_BOT_TOKEN TELEGRAM_CHAT_ID; do
            eval "val=\$$name"
            if [ -z "$val" ]; then
              echo "GitHub Secret $name 을 등록해 주세요. (CLOUD_SETUP.md §10)"
              exit 1
            fi
          done

      - name: Send stock quotes to Telegram
        env:
          STOCK_DAILY_STATE_FILE: data/stock_daily_sent.json
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python stock_alert.py

      - name: Save stock daily state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/stock_daily_sent.json
          key: job-alert-stock-daily-v1
