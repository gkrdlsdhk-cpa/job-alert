name: Telegram Medication Poll

on:
  # 9~12시 KST: 복용 완료 버튼 클릭 수신 (cron-job.org §10, 3~5분마다)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare data directory
        run: mkdir -p data

      - name: Restore state
        uses: actions/cache/restore@v4
        with:
          path: |
            data/medication_daily_state.json
            data/telegram_poll_state.json
          key: job-alert-medication-telegram-v1

      - name: Check Telegram Secrets
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          for name in TELEGRAM_BOT_TOKEN TELEGRAM_CHAT_ID; do
            eval "val=\$$name"
            if [ -z "$val" ]; then
              echo "GitHub Secret $name 을 등록해 주세요."
              exit 1
            fi
          done

      - name: Poll Telegram button clicks
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MEDICATION_DAILY_STATE_FILE: data/medication_daily_state.json
          TELEGRAM_POLL_STATE_FILE: data/telegram_poll_state.json
        run: python telegram_poll.py

      - name: Save state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            data/medication_daily_state.json
            data/telegram_poll_state.json
          key: job-alert-medication-telegram-v1
