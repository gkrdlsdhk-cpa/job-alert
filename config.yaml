# 회계법인 뉴스 (firm_news_briefing.py) — 매일 23시 Gmail + 텔레그램
# channel: telegram (권장) | kakao | email
firm_news_briefing:
  channel: telegram

# 관심 기업 — 네이버 뉴스 탭 검색 키워드 (회사명 = 키워드 1:1)
companies:
  - name: 삼일회계법인
    news_keywords:
      - 삼일회계법인
  - name: 삼정회계법인
    news_keywords:
      - 삼정회계법인
  - name: 안진회계법인
    news_keywords:
      - 안진회계법인
  - name: 한영회계법인
    news_keywords:
      - 한영회계법인

# 네이버 뉴스 검색 API (뉴스 탭, openapi.naver.com/v1/search/news.json)
naver:
  sort: date              # 최신순
  today_only: true        # 당일(KST) 기사만
  max_fetch_per_keyword: 50   # 당일 필터 전 조회 건수 (API 최대 100)

# 한국공인회계사회 — 구인(수습CPA) 실시간 카카오 알림 (kicpa_watch.py)
kicpa:
  watch_list_size: 30   # 몇 분마다 확인할 때, 최근 N건 스캔
  poll_minutes: 10      # GitHub Actions / Mac 스케줄 주기 (분)

# Realtime Job Alerts 공통 제외어 — 제목에 포함되면 채용공고 알림 제외
realtime_job_alerts:
  exclude_title_contains:
    - 인사
    - 총무

# 삼일PwC 정기채용 — 모집 오픈 시 카카오 알림 (pwc_watch.py)
pwc:
  watch_url: https://pwc.to/2xLHIx4
  poll_minutes: 15

# 딜로이트(안진회계법인) 채용 — 실시간 카카오 알림 (deloitte_watch.py, Realtime Job Alerts)
deloitte_watch:
  home_url: https://join.deloitte.co.kr
  exp_type: "1,3"          # 신입 (WiseRecruit 코드)
  exp_type_label: 신입
  service: AB               # Tax & Legal
  service_label: Tax & Legal
  keyword: ""
  service_dtl: ""
  max_results: 50

# EY한영(한영회계법인) 채용 사이트 — 실시간 카카오 알림 (ey_watch.py, Realtime Job Alerts)
ey_watch:
  home_url: https://eycareers-kr.recruiter.co.kr/career/home
  api_prefix: eycareers-kr.recruiter.co.kr
  classification_tag_name: 수시
  max_results: 50

# 삼정 KPMG 채용 사이트 — 실시간 카카오 알림 (kpmg_watch.py, Realtime Job Alerts)
kpmg_watch:
  list_url: https://career.kr.kpmg.com/hr/rec/recruit/jobopen/controller/candidate/JobOpen310WebController/init.hr
  receive_div_cd: N   # N=신입, E=경력, O=공채, A=전체
  max_results: 50

# 사람인 Big4 — 실시간 카카오 알림 (saramin_watch.py, Realtime Job Alerts)
saramin_watch:
  max_fetch_per_company: 50
  exclude_title_contains:
    - 경력
  companies:
    - search_keyword: 삼일회계법인
      company_name: 삼일회계법인
    - search_keyword: 삼정KPMG
      company_name: 삼정KPMG
    - search_keyword: 안진회계법인
      company_name: 안진회계법인
    - search_keyword: 한영회계법인
      company_name: 한영회계법인

# 경희대 경영대학 공지사항 — 채용 키워드 실시간 카카오 알림 (khubiz_notice_watch.py)
khubiz_notice_watch:
  list_url: https://kbiz.khu.ac.kr/biz_kor/user/bbs/BMSR00040/list.do?menuNo=14500123&boardType=&pageIndex=1&searchCondition=&searchKeyword=&userDisplayCount=10
  keywords:
    - 채용
    - 채용설명회
  max_results: 20

# 미국 주식·지수 — 매일 9시 알림 (stock_alert.py, 네이버 증권)
# channel: telegram (권장, CLOUD_SETUP.md §10) | kakao (나에게 보내기)
stock_alert:
  channel: telegram
  symbols:
    - naver_code: .IXIC
      kind: index
      name: 나스닥
      symbol: IXIC
    - naver_code: TSLA.O
      name: 테슬라
      symbol: TSLA
    - naver_code: NVDA.O
      name: 엔비디아
      symbol: NVDA

# 오늘의 tax 브리핑 — TaxWatch + 이택스뉴스 + 한국경제 + 택스타임스 + 일간NTN 당일 기사 Gmail + 텔레그램 (taxwatch_briefing.py)
# 자동 실행: cron-job.org 매일 23:00 KST → taxwatch-briefing.yml (CLOUD_SETUP.md §8-4)
taxwatch_briefing:
  channel: telegram
  max_pages: 30
  taxwatch: true
  hankyung:
    enabled: true
    list_url: https://www.hankyung.com/economy/tax
  etaxnews:
    enabled: true
    feeds:
      - section: 내국세
        list_url: https://www.etaxnews.com/news/articleList.html?sc_section_code=S1N1&sc_sub_section_code=S2N8&view_type=sm
      - section: 지방세
        list_url: https://www.etaxnews.com/news/articleList.html?sc_section_code=S1N1&sc_sub_section_code=S2N9&view_type=sm
      - section: 유권해석
        list_url: https://www.etaxnews.com/news/articleList.html?sc_section_code=S1N2&view_type=sm
  taxtimes:
    enabled: true
    feeds:
      - section: 내국세
        list_url: https://www.taxtimes.co.kr/news/section_list_all.html?sec_no=416
      - section: 지방세
        list_url: https://www.taxtimes.co.kr/news/section_list_all.html?sec_no=682
  intn:
    enabled: true
    feeds:
      - section: 유권해석
        list_url: https://www.intn.co.kr/news/articleList.html?sc_section_code=S1N5&view_type=sm
      - section: 조세행정
        list_url: https://www.intn.co.kr/news/articleList.html?sc_section_code=S1N6&view_type=sm
      - section: 오피니언
        list_url: https://www.intn.co.kr/news/articleList.html?sc_section_code=S1N8&view_type=sm

# 복약 알림 — 매일 (cron-job.org → medication-alert.yml, CLOUD_SETUP.md §10)
medication_alert:
  message: "아침 약 드실 시간이에요."
