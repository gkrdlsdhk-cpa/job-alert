# 관심 기업 (Big4·회계법인 위주)
companies:
  - name: 삼일회계법인
    news_keywords:
      - 삼일회계법인
      - Deloitte Korea
  - name: 안진회계법인
    news_keywords:
      - 안진회계법인
      - EY Korea
  - name: 삼정회계법인
    news_keywords:
      - 삼정회계법인
      - KPMG Korea
  - name: 한영회계법인
    news_keywords:
      - 한영회계법인
      - PwC Korea

# 네이버 뉴스: 키워드당 가져올 기사 수
naver:
  news_per_keyword: 3

# 사람인 채용 검색
saramin:
  search_keywords:
    - 회계법인
    - 감사
    - Big4
    - CPA
  max_results_per_keyword: 5

# 한국공인회계사회 — 구인(수습CPA) 실시간 카카오 알림 (kicpa_watch.py)
kicpa:
  watch_list_size: 30   # 몇 분마다 확인할 때, 최근 N건 스캔
  poll_minutes: 10      # GitHub Actions / Mac 스케줄 주기 (분)

# 삼일PwC 정기채용 — 모집 오픈 시 카카오 알림 (pwc_watch.py)
pwc:
  watch_url: https://pwc.to/2xLHIx4
  poll_minutes: 15

# 미국 주식·지수 — 매일 9시 알림 (stock_alert.py, 네이버 증권)
# channel: telegram (권장, CLOUD_SETUP.md §10) | kakao (나에게 보내기)
stock_alert:
  channel: telegram
  symbols:
    - naver_code: .IXIC
      kind: index
      name: 나스닥
      symbol: IXIC
    - naver_code: TSLA.O
      name: 테슬라
      symbol: TSLA
    - naver_code: NVDA.O
      name: 엔비디아
      symbol: NVDA

# 세금 뉴스 — TaxWatch + 이택스뉴스 당일 기사 Gmail 브리핑 + 텔레그램 (taxwatch_briefing.py)
# 자동 실행: cron-job.org 매일 23:00 KST → taxwatch-briefing.yml (CLOUD_SETUP.md §8-4)
taxwatch_briefing:
  channel: telegram
  max_pages: 30
  taxwatch: true
  etaxnews:
    enabled: true
    feeds:
      - section: 내국세
        list_url: https://www.etaxnews.com/news/articleList.html?sc_section_code=S1N1&sc_sub_section_code=S2N8&view_type=sm
      - section: 지방세
        list_url: https://www.etaxnews.com/news/articleList.html?sc_section_code=S1N1&sc_sub_section_code=S2N9&view_type=sm
      - section: 유권해석
        list_url: https://www.etaxnews.com/news/articleList.html?sc_section_code=S1N2&view_type=sm

# 복약 알림 — 매일 9시 (cron-job.org, CLOUD_SETUP.md §10)
# channel: telegram (채팅 안 복용 완료 버튼) | kakao (GAS 링크, §9)
medication_alert:
  channel: telegram
  message: "아침 약 드실 시간이에요."
  follow_up_message: "아직 복용 체크가 없어요. 아래 버튼을 눌러 주세요."
  mark_taken_url: ""
